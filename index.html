      }
    },
    {
      "@type": "Question",
      "name": "Como funciona o suporte oferecido?",
      "acceptedAnswer": {
        "@type": "Answer",

      }
    },
    {
      "@type": "Question",
      "name": "Posso acessar em qualquer dispositivo?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sim, o ILC é uma plataforma web responsiva, acessível de qualquer smartphone (iOS ou Android), tablet ou computador. Suas recordações são sincronizadas em tempo real."
      }
    }
