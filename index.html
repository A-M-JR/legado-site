  <!-- FAQPage -->
  <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "O que é o ILC (Instituto Legado e Conforto)?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "O ILC é uma solução que une tecnologia e acolhimento humano para organizar e dar continuidade aos vínculos mais importantes da vida — atuando no Luto, nos Cuidados Paliativos e na Autonomia do Idoso."
      }
    },
    {
      "@type": "Question",
      "name": "Como o ILC ajuda no cuidado com o idoso?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Entregamos ferramentas para organização da rotina (agenda médica, receitas, medicamentos) e um canal de comunicação fácil e seguro com a família, garantindo a autonomia e a dignidade na melhor fase da vida."
      }
    },
    {
      "@type": "Question",
      "name": "Como funciona o apoio em Cuidados Paliativos?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Atuamos como um espaço onde paciente e família se mantêm conectados. Oferecemos check-in diário, registro de memórias vivas, mensagens prontas de carinho e uma agenda compartilhada para diminuir o peso emocional do cuidado."
      }
    },
    {
      "@type": "Question",
      "name": "Qual o suporte oferecido para o Luto?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Proporcionamos um ambiente seguro para guardar fotos e histórias, além de um diário para expressão sem julgamentos e ferramentas para organização das informações da família durante o processo de despedida."
      }
    }
  ]
}
